<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <title>FurryChat Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amita&family=Averia+Libre&family=Charm&family=Comic+Neue&family=Comfortaa&family=Grandstander&family=Grenze+Gotisch&family=Kalam&family=Lemonada&family=Lobster+Two&family=Merienda&family=Orbitron&family=Quicksand&family=Sansita&family=Signika&family=Turret+Road&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-header">
    <div class="header-title-wrap">
      <h1>FurryChat Logs<span class="header-subtitle"> - Since May 10th 2026</span></h1>
      <p id="count"></p>
    </div>
  </div>
  <div class="controls-bar">
    <div class="controls-left">
      <span class="controls-label">Sort by:</span>
      <div class="custom-select-wrapper">
        <div class="custom-select" id="customSelect" tabindex="0">
          <span id="selectText">Oldest First</span>
          <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="custom-options" id="customOptions">
          <div class="custom-option" data-value="oldest">Oldest First</div>
          <div class="custom-option" data-value="newest">Newest First</div>
        </div>
      </div>
    </div>
    
    <div class="search-toolbar">
      <div class="search-input-wrap" id="searchWrap">
        <div class="search-inner">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input autocomplete="off" id="searchInput" placeholder="Search messages…" spellcheck="false">
          <button id="searchClearBtn" class="clear-btn" aria-label="Clear search" title="Clear search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>
      <button id="searchToggleBtn" class="icon-btn" aria-label="Toggle search" title="Search messages (Ctrl+F)">
        <svg fill="none" height="16" viewBox="0 0 16 16" width="16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" />
          <line stroke="currentColor" stroke-linecap="round" stroke-width="1.5" x1="11" x2="15" y1="11" y2="15" />
        </svg>
      </button>
      <div class="filter-btn-wrap">
        <button id="filterToggleBtn" class="icon-btn" aria-label="Toggle filters" title="Filter by user">
          <svg fill="none" height="16" viewBox="0 0 16 16" width="16" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 3.5h13M4 8h8M6.5 12.5h3" stroke="currentColor" stroke-linecap="round" stroke-width="1.5" />
          </svg>
        </button>
        <span class="filter-badge" id="filterBadge"></span>
      </div>
    </div>
  </div>
  <div class="filter-wrap">
  <div class="filter-panel" id="filterPanel">
    <div class="filter-panel-inner">
      <div class="filter-grid">
        <div class="filter-col">
          <label>Filter by Username</label>
          <div class="filter-input-row">
            <input autocomplete="off" id="nameFilterInput" placeholder="e.g. FoxyPaws">
            <button id="addNameFilter" class="filter-add-btn">Add</button>
          </div>
        </div>
        <div class="filter-col">
          <label>Filter by User ID</label>
          <div class="filter-input-row">
            <input autocomplete="off" id="idFilterInput" placeholder="e.g. 123456789">
            <button id="addIdFilter" class="filter-add-btn">Add</button>
          </div>
        </div>
      </div>
      <div class="filter-chips" id="filterChips"></div>
      <div class="filter-clear-row">
        <button id="clearFilters" class="filter-clear-btn">Clear all</button>
      </div>
    </div>
  </div>
  </div>
  <div class="log-container">
    <div id="log"></div>
    <div id="no-results">
      <svg class="no-results-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
      <span>No messages match your search or filters.</span>
    </div>
  </div>
  <div id="lightbox">
    <button id="lightbox-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <img alt="Full size image" id="lightbox-img" src="">
  </div>
  <script src="script.js"></script>
</body>
</html>
