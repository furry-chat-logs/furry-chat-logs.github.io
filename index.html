<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta content="width=device-width,initial-scale=1" name="viewport"><title>FurryChat Logs</title><link rel="stylesheet" href="styles.css"></head><body><div class="page-header"><h1>FurryChat Logs<span style="color:var(--text-muted);font-weight:400;font-size:1.1rem"> - Since May 10th 2026</span></h1><div class="header-eyebrow"><p id="status">Loading…</p></div><p id="count"></p></div><div class="controls-bar"><span class="controls-label">Sort by:</span><div class="custom-select-wrapper"><div class="custom-select" id="customSelect"><span id="selectText">Oldest First</span><span style="font-size:.65em;opacity:.6">▼</span></div><div class="custom-options" id="customOptions"><div class="custom-option" data-value="oldest">Oldest First</div><div class="custom-option" data-value="newest">Newest First</div></div></div><div class="search-toolbar"><div class="search-input-wrap" id="searchWrap"><div class="search-inner"><input autocomplete="off" id="searchInput" placeholder="Search messages…" spellcheck="false"><button id="searchClearBtn" class="clear-btn" aria-label="Clear search" title="Clear search">×</button></div></div><button id="searchToggleBtn" class="icon-btn" aria-label="Toggle search" title="Search messages (Ctrl+F)"><svg fill="none" height="15" viewBox="0 0 15 15" width="15" xmlns="http://www.w3.org/2000/svg"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5" /><line stroke="currentColor" stroke-linecap="round" stroke-width="1.5" x1="10.5" x2="14" y1="10.5" y2="14" /></svg></button><div class="filter-btn-wrap filter-panel-wrap"><button id="filterToggleBtn" class="icon-btn" aria-label="Toggle filters" title="Filter by user"><svg fill="none" height="15" viewBox="0 0 15 15" width="15" xmlns="http://www.w3.org/2000/svg"><path d="M1 3h13M3.5 7.5h8M6 12h3" stroke="currentColor" stroke-linecap="round" stroke-width="1.5" /></svg></button><span class="filter-badge" id="filterBadge"></span><div class="filter-panel" id="filterPanel"><div><label>Filter by Username</label><div class="filter-input-row"><input autocomplete="off" id="nameFilterInput" placeholder="e.g. FoxyPaws"><button id="addNameFilter" class="filter-add-btn">Add</button></div></div><div><label>Filter by User ID</label><div class="filter-input-row"><input autocomplete="off" id="idFilterInput" placeholder="e.g. 123456789"><button id="addIdFilter" class="filter-add-btn">Add</button></div></div><div class="filter-chips" id="filterChips"></div><div class="filter-clear-row"><button id="clearFilters" class="filter-clear-btn">Clear all</button></div></div></div></div></div><div class="log-container"><div id="log"></div><div id="no-results">No messages match your search or filters.</div></div><div id="lightbox"><button id="lightbox-close" aria-label="Close">×</button><img alt="Full size image" id="lightbox-img" src=""></div><script src="script.js"></script></body></html>
