<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FurryChat Logs</title>
</head>
<body>

<h1>FurryChat Public Chat Logs</h1>
<p id="status">Loading...</p>
<p id="count"></p>
<hr>
<div id="log"></div>

<script>
  // GitHub Contents API — bypasses the CDN cache that raw.githubusercontent.com uses
  const API_URL =
    'https://api.github.com/repos/furry-chat-logs/furry-chat-logs.github.io/contents/chatlog.json?ref=main';

  async function loadLogs() {
    const status = document.getElementById('status');
    const count  = document.getElementById('count');
    const log    = document.getElementById('log');

    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const meta = await res.json();
      // Content is base64-encoded by the API — decode it
      const entries = JSON.parse(atob(meta.content));

      status.textContent = 'Last refreshed: ' + new Date().toLocaleString();
      count.textContent  = entries.length + ' message(s) total';

      log.innerHTML = '';

      entries.forEach(m => {
        const line = document.createElement('p');

        if (m.type === 'system') {
          line.textContent = '[' + m.date + '] *** SYSTEM: ' + m.message;
        } else {
          line.textContent = '[' + m.date + '] ' + m.username + ': ' + m.message;
        }

        log.appendChild(line);
      });

    } catch (err) {
      status.textContent = 'Error loading logs: ' + err.message;
    }
  }

  // Load on page open, then refresh every 30 seconds
  loadLogs();
  setInterval(loadLogs, 30000);
</script>

</body>
</html>
